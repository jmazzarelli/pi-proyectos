<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pi Proyección de Ideas — Proyectos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #1a1a1a;
  --border: rgba(255,255,255,0.08);
  --border2: rgba(255,255,255,0.15);
  --text: #f0f0f0;
  --muted: #888;
  --accent: #c8ff00;
  --accent2: #7c3aed;
  --danger: #ff4444;
  --tag-mapping: #c8ff00;
  --tag-fooh: #00ffcc;
  --tag-hologramas: #ff9500;
  --tag-inmersivos: #ff6b6b;
  --tag-interactivos: #4db8ff;
  --tag-pov: #b8b8b8;
  --tag-reels: #ff80bf;
  --tag-virtual: #80ff9e;
  --tag-publicidad: #ffcc44;
  --tag-destacados: #c8ff00;
  --font-display: 'Syne', sans-serif;
  --font-mono: 'DM Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  min-height: 100vh;
  line-height: 1.6;
}

/* ── HEADER ─────────────────────────── */
.header {
  padding: 2rem 2.5rem 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 1rem;
  flex-wrap: wrap;
}
.header-left h1 {
  font-family: var(--font-display);
  font-size: 28px;
  font-weight: 800;
  color: var(--text);
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.header-left h1 span { color: var(--accent); }
.header-left p {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
  font-style: italic;
}
.btn-add {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 10px 20px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 4px;
  transition: opacity .15s, transform .1s;
  white-space: nowrap;
  letter-spacing: 0.3px;
}
.btn-add:hover { opacity: .85; transform: translateY(-1px); }

/* ── METRICS ─────────────────────────── */
.metrics {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
  border-bottom: 1px solid var(--border);
}
.metric {
  background: var(--bg);
  padding: 1.2rem 2rem;
}
.metric-label {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 6px;
}
.metric-value {
  font-family: var(--font-display);
  font-size: 32px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
}

/* ── TOOLBAR ─────────────────────────── */
.toolbar {
  padding: 1rem 2.5rem;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
}
.toolbar input[type="text"],
.toolbar select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 12px;
  padding: 7px 12px;
  border-radius: 4px;
  outline: none;
  transition: border-color .15s;
}
.toolbar input[type="text"]:focus,
.toolbar select:focus { border-color: var(--accent); }
#search { width: 240px; }
.toolbar select option { background: var(--bg3); }

.tags-bar {
  padding: .75rem 2.5rem;
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  align-items: center;
}
.tags-bar span {
  font-size: 10px;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-right: 4px;
}
.tag-btn {
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 2px;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  transition: all .15s;
}
.tag-btn:hover { border-color: var(--text); color: var(--text); }
.tag-btn.active { color: #000; border-color: transparent; }

.btn-export {
  margin-left: auto;
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 7px 14px;
  border-radius: 4px;
  cursor: pointer;
  transition: all .15s;
}
.btn-export:hover { border-color: var(--accent); color: var(--accent); }

/* ── RESULTS BAR ─────────────────────── */
.results-bar {
  padding: .5rem 2.5rem;
  font-size: 11px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}

/* ── TABLE ───────────────────────────── */
.table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  min-width: 900px;
}
thead th {
  padding: 10px 16px;
  text-align: left;
  font-size: 10px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  background: var(--bg2);
  white-space: nowrap;
  cursor: pointer;
  user-select: none;
  transition: color .15s;
}
thead th:hover { color: var(--text); }
thead th.sorted { color: var(--accent); }

tbody tr {
  border-bottom: 1px solid var(--border);
  transition: background .1s;
}
tbody tr:hover { background: var(--bg3); }
td {
  padding: 10px 16px;
  vertical-align: middle;
  color: var(--text);
}

.cell-nombre { font-weight: 500; font-size: 13px; max-width: 220px; }
.cell-fecha { font-size: 12px; color: var(--muted); white-space: nowrap; font-style: italic; }
.cell-desc { font-size: 12px; color: var(--muted); max-width: 220px; }
.cell-lugar { font-size: 12px; color: var(--muted); max-width: 140px; }
.cell-tags { max-width: 200px; }
.cell-actions { white-space: nowrap; }

/* ── TAGS ────────────────────────────── */
.tag {
  display: inline-block;
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 2px;
  margin: 2px 2px 2px 0;
  font-weight: 500;
  letter-spacing: 0.3px;
  color: #000;
}
.tg-Mapping    { background: var(--tag-mapping); }
.tg-Fooh       { background: var(--tag-fooh); }
.tg-Hologramas { background: var(--tag-hologramas); }
.tg-Inmersivos { background: var(--tag-inmersivos); }
.tg-Interactivos { background: var(--tag-interactivos); }
.tg-Pov        { background: var(--tag-pov); }
.tg-Reels      { background: var(--tag-reels); }
.tg-Virtual    { background: var(--tag-virtual); }
.tg-Publicidad { background: var(--tag-publicidad); }
.tg-Destacados { background: var(--tag-destacados); }
.tg-Portafolio { background: #333; color: #888; }
.tg-default    { background: #333; color: #aaa; }

/* ── ACTION BUTTONS ──────────────────── */
.btn-yt {
  display: inline-block;
  background: transparent;
  border: 1px solid #333;
  color: var(--muted);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 3px;
  text-decoration: none;
  font-family: var(--font-mono);
  transition: all .15s;
  margin-right: 4px;
}
.btn-yt:hover { border-color: #ff4444; color: #ff4444; }
.btn-edit, .btn-del {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 3px;
  cursor: pointer;
  transition: all .15s;
  margin-right: 4px;
}
.btn-edit:hover { border-color: var(--accent); color: var(--accent); }
.btn-del:hover  { border-color: var(--danger); color: var(--danger); }

/* ── MODAL ───────────────────────────── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.85);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 6px;
  padding: 2rem;
  width: 100%;
  max-width: 620px;
  max-height: 90vh;
  overflow-y: auto;
  position: relative;
}
.modal h2 {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 1.5rem;
  color: var(--text);
}
.modal h2 span { color: var(--accent); }
.modal-close {
  position: absolute;
  top: 1rem; right: 1rem;
  background: none; border: none;
  color: var(--muted);
  font-size: 20px;
  cursor: pointer;
  line-height: 1;
  transition: color .15s;
}
.modal-close:hover { color: var(--text); }

.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
}
.form-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}
.form-group.full { grid-column: 1 / -1; }
.form-group label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
}
.form-group input,
.form-group textarea,
.form-group select {
  background: var(--bg3);
  border: 1px solid var(--border2);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 13px;
  padding: 9px 12px;
  border-radius: 4px;
  outline: none;
  transition: border-color .15s;
  resize: vertical;
}
.form-group input:focus,
.form-group textarea:focus,
.form-group select:focus { border-color: var(--accent); }
.form-group textarea { min-height: 72px; }

.tags-check {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.tags-check label {
  display: flex;
  align-items: center;
  gap: 5px;
  font-size: 11px;
  color: var(--text);
  cursor: pointer;
  text-transform: none;
  letter-spacing: 0;
  padding: 4px 8px;
  border: 1px solid var(--border2);
  border-radius: 3px;
  transition: all .15s;
}
.tags-check label:hover { border-color: var(--accent); }
.tags-check input[type=checkbox] { accent-color: var(--accent); }

.modal-actions {
  margin-top: 1.5rem;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
}
.btn-save {
  background: var(--accent);
  color: #000;
  border: none;
  padding: 10px 24px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 4px;
  transition: opacity .15s;
}
.btn-save:hover { opacity: .85; }
.btn-cancel {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--muted);
  padding: 10px 20px;
  font-family: var(--font-mono);
  font-size: 13px;
  cursor: pointer;
  border-radius: 4px;
  transition: all .15s;
}
.btn-cancel:hover { border-color: var(--text); color: var(--text); }

/* ── CONFIRM MODAL ───────────────────── */
.confirm-modal {
  max-width: 400px;
  text-align: center;
}
.confirm-modal p {
  color: var(--muted);
  margin-bottom: 1.5rem;
  font-size: 14px;
}
.confirm-modal .nombre {
  color: var(--text);
  font-weight: 500;
  font-size: 15px;
  display: block;
  margin-top: .5rem;
}
.btn-del-confirm {
  background: var(--danger);
  color: #fff;
  border: none;
  padding: 10px 24px;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  border-radius: 4px;
}

/* ── TOAST ───────────────────────────── */
.toast {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  background: var(--accent);
  color: #000;
  font-family: var(--font-display);
  font-size: 13px;
  font-weight: 700;
  padding: 12px 20px;
  border-radius: 4px;
  z-index: 999;
  opacity: 0;
  transform: translateY(10px);
  transition: all .3s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── EMPTY STATE ─────────────────────── */
.empty {
  padding: 4rem;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
  font-style: italic;
}
.loading-bar {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: var(--accent);
  width: 0%;
  transition: width .4s ease;
  z-index: 9999;
}
.loading-bar.active { width: 75%; }
.loading-bar.done   { width: 100%; opacity: 0; transition: width .2s, opacity .5s .2s; }
.spinner {
  display: none;
  position: fixed;
  bottom: 2rem; left: 2rem;
  font-size: 11px;
  color: var(--muted);
  font-family: var(--font-mono);
  font-style: italic;
  background: var(--bg2);
  padding: 8px 14px;
  border-radius: 4px;
  border: 1px solid var(--border);
}
.spinner.show { display: block; }

@media (max-width: 640px) {
  .metrics { grid-template-columns: repeat(2, 1fr); }
  .header { padding: 1.5rem; }
  .toolbar, .tags-bar { padding: 1rem 1.5rem; }
  .table-wrap { padding: 0; }
  .form-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <h1><span>Pi</span> Proyección de Ideas</h1>
    <p>Gestión de proyectos audiovisuales · 2010 – 2025</p>
  </div>
  <button class="btn-add" onclick="openModal()">+ Nuevo proyecto</button>
</div>

<!-- METRICS -->
<div class="metrics" id="metrics">
  <div class="metric"><div class="metric-label">Total</div><div class="metric-value" id="m-total">—</div></div>
  <div class="metric"><div class="metric-label">Años</div><div class="metric-value" id="m-years">—</div></div>
  <div class="metric"><div class="metric-label">Categorías</div><div class="metric-value" id="m-cats">—</div></div>
  <div class="metric"><div class="metric-label">Destacados</div><div class="metric-value" id="m-dest">—</div></div>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <input type="text" id="search" placeholder="Buscar proyecto, lugar, descripción…">
  <select id="yearFilter"><option value="">Todos los años</option></select>
  <button class="btn-export" onclick="exportCSV()">↓ Exportar CSV</button>
</div>

<div class="tags-bar">
  <span>Filtrar:</span>
  <div id="tagBtns"></div>
</div>

<div class="results-bar" id="resultsBar"></div>

<!-- TABLE -->
<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th data-col="proyecto">Proyecto</th>
        <th data-col="fecha">Fecha</th>
        <th>Etiquetas</th>
        <th data-col="lugar">Lugar</th>
        <th>Descripción</th>
        <th>Acciones</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<!-- MODAL FORM -->
<div class="modal-overlay" id="formOverlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <h2 id="modalTitle">Nuevo <span>proyecto</span></h2>
    <input type="hidden" id="editId">
    <div class="form-grid">
      <div class="form-group full">
        <label>Nombre del proyecto *</label>
        <input type="text" id="f-proyecto" placeholder="Ej: Mapping Congreso Futuro">
      </div>
      <div class="form-group">
        <label>Fecha de realización *</label>
        <input type="date" id="f-fecha">
      </div>
      <div class="form-group">
        <label>Lugar</label>
        <input type="text" id="f-lugar" placeholder="Ej: Palacio La Moneda">
      </div>
      <div class="form-group full">
        <label>Link de YouTube (embed)</label>
        <input type="text" id="f-link" placeholder="https://www.youtube.com/embed/XXXX">
      </div>
      <div class="form-group full">
        <label>Descripción</label>
        <textarea id="f-desc" placeholder="Breve descripción del proyecto…"></textarea>
      </div>
      <div class="form-group full">
        <label>Etiquetas</label>
        <div class="tags-check" id="tagsCheck"></div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveProject()">Guardar proyecto</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRM DELETE -->
<div class="modal-overlay" id="confirmOverlay">
  <div class="modal confirm-modal">
    <h2>Eliminar <span>proyecto</span></h2>
    <p>¿Seguro que deseas eliminar?<span class="nombre" id="delNombre"></span></p>
    <div style="display:flex;gap:10px;justify-content:center">
      <button class="btn-cancel" onclick="closeConfirm()">Cancelar</button>
      <button class="btn-del-confirm" onclick="confirmDelete()">Sí, eliminar</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<!-- LOADING -->
<div class="loading-bar" id="loadingBar"></div>
<div class="spinner" id="spinner">Guardando en Sheets…</div>

let projects = [];   // array de objetos

let sortCol = "fecha";

let deleteId = null;

// ──────────────────────────────────────────
// CONFIG GOOGLE SHEETS
// ──────────────────────────────────────────
const API_URL = "https://script.google.com/a/macros/pi.cl/s/AKfycbzDLnbKG40y8NRyA0AoHy8SWrBKC01nudFqdc7sAyJvhP2Qsa12N1ykJj-jPo6tksKJsg/exec";

// ──────────────────────────────────────────
// STORAGE: lee y escribe en Google Sheets
// ──────────────────────────────────────────
async function loadData() {
  showLoading(true);
  try {
    const res = await fetch(API_URL + "?action=getAll");
    const data = await res.json();
    if (Array.isArray(data) && data.length > 0) {
      // Sheets devuelve los datos — asignar id numérico si falta
      projects = data.map((p, i) => ({ ...p, id: p.id ? Number(p.id) : Date.now() + i }));
    } else {
      // Hoja vacía: cargar datos iniciales y guardar
      projects = INITIAL_DATA.map((p, i) => ({ ...p, id: Date.now() + i }));
      await saveData();
    }
  } catch (err) {
    console.error("Error cargando datos:", err);
    showToast("⚠ Error al conectar con Google Sheets");
    // Fallback: datos iniciales en memoria
    projects = INITIAL_DATA.map((p, i) => ({ ...p, id: Date.now() + i }));
  }
  showLoading(false);
}

async function saveData() {
  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({ action: "save", projects }),
    });
  } catch (err) {
    console.error("Error guardando datos:", err);
    showToast("⚠ Error al guardar en Google Sheets");
  }
}

  return map[t] || "tg-default";
}

// ──────────────────────────────────────────
// INIT: construir filtros
// ──────────────────────────────────────────
function initFilters() {
  // Años únicos
  const years = [...new Set(projects.map(p => p.fecha.substring(0,4)))].sort((a,b) => b-a);
  const sel = document.getElementById("yearFilter");
  sel.innerHTML = '<option value="">Todos los años</option>';
  years.forEach(y => {
    const o = document.createElement("option");
    o.value = y; o.textContent = y;
    sel.appendChild(o);
  });

  // Botones de tags
  const container = document.getElementById("tagBtns");
  container.innerHTML = "";
  ALL_TAGS.forEach(tag => {
    const btn = document.createElement("button");
    btn.className = "tag-btn" + (activeTag === tag ? " active" : "");
    btn.textContent = tag;
    btn.style.setProperty("--active-bg", getTagColor(tag));
    if (activeTag === tag) btn.style.background = getTagColor(tag);
    btn.onclick = () => {
      activeTag = activeTag === tag ? null : tag;
      initFilters(); render();
    };
    container.appendChild(btn);
  });
}

function getTagColor(tag) {
  const map = {
    "Mapping":"#c8ff00","Fooh":"#00ffcc","Hologramas":"#ff9500",
    "Inmersivos":"#ff6b6b","Interactivos":"#4db8ff","Pov":"#b8b8b8",
    "Reels":"#ff80bf","Producción Virtual":"#80ff9e","Publicidad Inmersiva":"#ffcc44",
    "Destacados":"#c8ff00","Portafolio":"#555"
  };
  return map[tag] || "#555";
}

// ──────────────────────────────────────────
// FILTRAR Y ORDENAR
// ──────────────────────────────────────────
function getFiltered() {
  const q = document.getElementById("search").value.toLowerCase();
  const yr = document.getElementById("yearFilter").value;
  return projects.filter(p => {
    if (yr && !p.fecha.startsWith(yr)) return false;
    if (activeTag && !p.etiquetas.includes(activeTag)) return false;
    if (q && !p.proyecto.toLowerCase().includes(q) &&
            !p.lugar.toLowerCase().includes(q) &&
            !p.descripcion.toLowerCase().includes(q)) return false;
    return true;
  }).sort((a, b) => {
    const va = (a[sortCol] || "").toLowerCase();
    const vb = (b[sortCol] || "").toLowerCase();
    return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
}

// ──────────────────────────────────────────
// RENDER
// ──────────────────────────────────────────
function render() {
  const filtered = getFiltered();

  // Métricas
  const allYears = new Set(filtered.map(p => p.fecha.substring(0,4))).size;
  const allCats  = new Set(filtered.flatMap(p => p.etiquetas.split(",").map(t => t.trim()))).size;
  const dest     = filtered.filter(p => p.etiquetas.includes("Destacados")).length;
  document.getElementById("m-total").textContent = filtered.length;
  document.getElementById("m-years").textContent = allYears;
  document.getElementById("m-cats").textContent  = allCats;
  document.getElementById("m-dest").textContent  = dest;

  // Contador
  document.getElementById("resultsBar").textContent =
    `Mostrando ${filtered.length} de ${projects.length} proyectos`;

  // Tabla
  const tbody = document.getElementById("tbody");
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">Sin resultados para los filtros seleccionados.</td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(p => {
    const tags = p.etiquetas.split(",").map(t => t.trim()).filter(t => t)
      .map(t => `<span class="tag ${tagClass(t)}">${t}</span>`).join("");
    const ytUrl = p.link
      ? p.link.replace("/embed/", "/watch?v=").replace("?start=", "&t=")
      : "";
    const ytBtn = p.link
      ? `<a class="btn-yt" href="${ytUrl}" target="_blank">▶ YT</a>`
      : "";
    const desc = p.descripcion
      ? `<span class="cell-desc">${p.descripcion.substring(0, 75)}${p.descripcion.length > 75 ? "…" : ""}</span>`
      : `<span style="color:#444">—</span>`;

    return `<tr>
      <td class="cell-nombre">${p.proyecto}</td>
      <td class="cell-fecha">${p.fecha}</td>
      <td class="cell-tags">${tags}</td>
      <td class="cell-lugar">${p.lugar || "—"}</td>
      <td>${desc}</td>
      <td class="cell-actions">
        ${ytBtn}
        <button class="btn-edit" onclick="openEdit(${p.id})">Editar</button>
        <button class="btn-del"  onclick="openDelete(${p.id})">Eliminar</button>
      </td>
    </tr>`;
  }).join("");

  // Ordenamiento: resaltar columna activa
  document.querySelectorAll("thead th").forEach(th => {
    th.classList.toggle("sorted", th.dataset.col === sortCol);
  });
}

// ──────────────────────────────────────────
// LOADING INDICATOR
// ──────────────────────────────────────────
function showLoading(on) {
  const bar = document.getElementById("loadingBar");
  const sp  = document.getElementById("spinner");
  if (on) {
    bar.classList.remove("done");
    bar.classList.add("active");
    sp.classList.add("show");
  } else {
    bar.classList.remove("active");
    bar.classList.add("done");
    sp.classList.remove("show");
    setTimeout(() => bar.classList.remove("done"), 700);
  }
}

// ──────────────────────────────────────────
// MODAL NUEVO / EDITAR
// ──────────────────────────────────────────
function buildTagsCheck(selectedTags = []) {
  const container = document.getElementById("tagsCheck");
  container.innerHTML = ALL_TAGS.map(tag => `
    <label>
      <input type="checkbox" value="${tag}" ${selectedTags.includes(tag) ? "checked" : ""}>
      ${tag}
    </label>
  `).join("");
}

function openModal() {
  document.getElementById("modalTitle").innerHTML = 'Nuevo <span>proyecto</span>';
  document.getElementById("editId").value = "";
  document.getElementById("f-proyecto").value = "";
  document.getElementById("f-fecha").value = new Date().toISOString().split("T")[0];
  document.getElementById("f-lugar").value = "";
  document.getElementById("f-link").value = "";
  document.getElementById("f-desc").value = "";
  buildTagsCheck();
  document.getElementById("formOverlay").classList.add("open");
}

function openEdit(id) {
  const p = projects.find(x => x.id === id);
  if (!p) return;
  document.getElementById("modalTitle").innerHTML = 'Editar <span>proyecto</span>';
  document.getElementById("editId").value = id;
  document.getElementById("f-proyecto").value = p.proyecto;
  document.getElementById("f-fecha").value = p.fecha;
  document.getElementById("f-lugar").value = p.lugar;
  document.getElementById("f-link").value = p.link;
  document.getElementById("f-desc").value = p.descripcion;
  const selTags = p.etiquetas.split(",").map(t => t.trim());
  buildTagsCheck(selTags);
  document.getElementById("formOverlay").classList.add("open");
}

function closeModal() {
  document.getElementById("formOverlay").classList.remove("open");
}

async function saveProject() {
  const nombre = document.getElementById("f-proyecto").value.trim();
  const fecha  = document.getElementById("f-fecha").value;
  if (!nombre || !fecha) { showToast("⚠ Nombre y fecha son obligatorios"); return; }

  // Obtener tags seleccionados
  const tags = [...document.querySelectorAll("#tagsCheck input:checked")]
    .map(cb => cb.value).join(", ");

  const editId = document.getElementById("editId").value;

  if (editId) {
    // Actualizar existente
    const idx = projects.findIndex(p => p.id == editId);
    if (idx >= 0) {
      projects[idx] = {
        ...projects[idx],
        proyecto: nombre,
        fecha: fecha,
        lugar: document.getElementById("f-lugar").value.trim(),
        link: document.getElementById("f-link").value.trim(),
        descripcion: document.getElementById("f-desc").value.trim(),
        etiquetas: tags
      };
    }
    showToast("Proyecto actualizado ✓");
  } else {
    // Nuevo proyecto
    projects.unshift({
      id: Date.now(),
      proyecto: nombre,
      fecha: fecha,
      lugar: document.getElementById("f-lugar").value.trim(),
      link: document.getElementById("f-link").value.trim(),
      descripcion: document.getElementById("f-desc").value.trim(),
      etiquetas: tags
    });
    showToast("Proyecto agregado ✓");
  }

  saveData();
  closeModal();
  initFilters();
  render();
  showLoading(true);
  await saveData();
  showLoading(false);
}

// ──────────────────────────────────────────
// ELIMINAR
// ──────────────────────────────────────────
function openDelete(id) {
  deleteId = id;
  const p = projects.find(x => x.id === id);
  document.getElementById("delNombre").textContent = p ? p.proyecto : "";
  document.getElementById("confirmOverlay").classList.add("open");
}

function closeConfirm() {
  deleteId = null;
  document.getElementById("confirmOverlay").classList.remove("open");
}

async function confirmDelete() {
  if (deleteId === null) return;
  projects = projects.filter(p => p.id !== deleteId);
  closeConfirm();
  initFilters();
  render();
  showToast("Proyecto eliminado");
  showLoading(true);
  await saveData();
  showLoading(false);
}

// ──────────────────────────────────────────
// EXPORTAR CSV
// ──────────────────────────────────────────
function exportCSV() {
  const filtered = getFiltered();
  const headers = ["Proyecto","Fecha","Etiquetas","Lugar","Descripción","Link YouTube"];
  const rows = filtered.map(p => [
    `"${(p.proyecto||"").replace(/"/g,'""')}"`,
    `"${p.fecha}"`,
    `"${(p.etiquetas||"").replace(/"/g,'""')}"`,
    `"${(p.lugar||"").replace(/"/g,'""')}"`,
    `"${(p.descripcion||"").replace(/"/g,'""')}"`,
    `"${(p.link||"").replace(/"/g,'""')}"`
  ].join(","));

  const csv = [headers.join(","), ...rows].join("\n");
  const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href     = url;
  a.download = `pi-proyectos-${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
  URL.revokeObjectURL(url);
  showToast("CSV exportado ✓");
}

// ──────────────────────────────────────────
// TOAST
// ──────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

// ──────────────────────────────────────────
// EVENTOS GLOBALES
// ──────────────────────────────────────────
document.getElementById("search").addEventListener("input", render);
document.getElementById("yearFilter").addEventListener("change", render);

// Ordenamiento por columna
document.querySelectorAll("thead th[data-col]").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (sortCol === col) sortAsc = !sortAsc;
    else { sortCol = col; sortAsc = false; }
    render();
  });
});

// Cerrar modal al hacer click fuera
document.getElementById("formOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeModal();
});
document.getElementById("confirmOverlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeConfirm();
});

// ESC para cerrar modales
document.addEventListener("keydown", e => {
  if (e.key === "Escape") { closeModal(); closeConfirm(); }
});

// ──────────────────────────────────────────
// ARRANQUE
// ──────────────────────────────────────────
(async () => {
  await loadData();
  initFilters();
  render();
})();
</script>
